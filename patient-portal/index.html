<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VitalFlow AI — Patient Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  html, body { overflow-y: auto !important; height: auto !important; }
  :root {
    --navy: #0a1628; --navy-mid: #112240;
    --teal: #0d9488; --teal-light: #14b8a6;
    --cream: #f0ede8; --cream-dim: #c8c4bc;
    --border: rgba(13,148,136,0.15); --text: #e8e4de;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--navy); color: var(--text);
    font-family: 'DM Sans', sans-serif; min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(13,148,136,0.05) 1px,transparent 1px), linear-gradient(90deg,rgba(13,148,136,0.05) 1px,transparent 1px);
    background-size:60px 60px; animation:gridMove 20s linear infinite; pointer-events:none;
  }
  @keyframes gridMove { 0%{transform:translateY(0)} 100%{transform:translateY(60px)} }

  .wrap {
    position:relative; z-index:10; width:100%; max-width:440px;
    margin: 40px auto; padding: 0 20px;
  }

  .logo { display:flex; align-items:center; gap:12px; justify-content:center; margin-bottom:36px; }
  .logo-icon { width:42px; height:42px; background:var(--teal); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:20px; }
  .logo-text { font-family:'DM Serif Display',serif; font-size:22px; color:var(--cream); }
  .logo-text span { color:var(--teal-light); }

  .card {
    background: var(--navy-mid); border:1px solid var(--border);
    border-radius:16px; padding:36px;
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .card-title { font-family:'DM Serif Display',serif; font-size:26px; color:var(--cream); margin-bottom:6px; }
  .card-sub { font-size:13px; color:var(--cream-dim); margin-bottom:28px; font-weight:300; }

  .field { margin-bottom:18px; }
  .field label { display:block; font-size:11px; font-weight:600; color:var(--cream-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .field input { width:100%; background:rgba(255,255,255,0.04); border:1px solid var(--border); border-radius:8px; padding:13px 16px; color:var(--cream); font-family:'DM Sans',sans-serif; font-size:14px; outline:none; transition:border-color .2s; }
  .field input:focus { border-color:var(--teal); background:rgba(13,148,136,0.06); }
  .field input::placeholder { color:rgba(200,196,188,0.35); }

  .hint { font-size:12px; color:var(--cream-dim); margin-top:6px; }
  .hint span { color:var(--teal-light); font-family:monospace; letter-spacing:1px; }

  .btn-primary { width:100%; background:var(--teal); color:#fff; border:none; border-radius:8px; padding:14px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:500; cursor:pointer; transition:background .2s; margin-top:8px; }
  .btn-primary:hover { background:var(--teal-light); }
  .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }

  .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); border-radius:6px; padding:10px 14px; font-size:13px; color:#fca5a5; margin-bottom:16px; display:none; }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">🫀</div>
    <div class="logo-text">VitalFlow <span>AI</span></div>
  </div>

  <div class="card">
    <div class="card-title">Patient Login</div>
    <div class="card-sub">Use the login code and password given by your doctor</div>

    <div class="error-msg" id="error-msg"></div>

    <div class="field">
      <label>Login Code</label>
      <input type="text" id="login-code" placeholder="e.g. AB12CD34" style="text-transform:uppercase;letter-spacing:2px;">
      <div class="hint">Your doctor gave you a code like <span>AB12CD34</span></div>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="loginPatient()" id="login-btn">Sign In</button>
  </div>
</div>

<script>
  const API = 'http://localhost:8000';

  if (localStorage.getItem('patient_token')) window.location.href = 'dashboard.html';

  document.addEventListener('keydown', e => { if (e.key === 'Enter') loginPatient(); });

  async function loginPatient() {
    const code = document.getElementById('login-code').value.trim().toUpperCase();
    const password = document.getElementById('login-password').value;
    if (!code || !password) return showError('Please enter your login code and password.');

    const btn = document.getElementById('login-btn');
    btn.disabled = true; btn.textContent = 'Signing in...';

    try {
      const form = new URLSearchParams();
      form.append('username', code);
      form.append('password', password);

      const res = await fetch(`${API}/patient/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: form
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Invalid code or password');

      localStorage.setItem('patient_token', data.access_token);
      localStorage.setItem('patient_name', data.name);
      localStorage.setItem('patient_id', data.patient_id);

      window.location.href = 'dashboard.html';
    } catch(e) {
      showError(e.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Sign In';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = msg; el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 4000);
  }
</script>
</body>
</html>
